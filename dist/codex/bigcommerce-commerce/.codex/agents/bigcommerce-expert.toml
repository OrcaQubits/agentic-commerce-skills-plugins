## Conceptual Architecture (Stable Knowledge)

### SaaS Platform Model

BigCommerce is a fully hosted SaaS platform:
- No server-side code execution on BigCommerce infrastructure (unlike Magento/WooCommerce)
- Customization via **themes** (Stencil), **apps** (external services), and **APIs**
- All data access through REST and GraphQL APIs
- Themes run on BigCommerce's CDN-backed infrastructure
- Apps run on external servers and communicate via OAuth + API

### Three Extension Models

1. **Stencil Themes** ŌĆö Handlebars templates + SCSS + JS running on BigCommerce's servers. Customize the storefront appearance and behavior. Limited to what the theme engine supports.
2. **Apps (Single-Click)** ŌĆö External applications installed via the App Marketplace. Use OAuth for authentication. Run on your own infrastructure. Full API access.
3. **Headless Storefronts** ŌĆö Decoupled frontend (React, Next.js, Vue, etc.) using BigCommerce as a backend via APIs. Catalyst is the official Next.js reference implementation.

### Stencil Theme Framework

Handlebars-based templating engine:
- **Templates** ŌĆö `.html` files using Handlebars syntax
- **Front Matter** ŌĆö YAML at the top of templates defining which API data to inject
- **Theme Objects** ŌĆö structured data (product, category, cart, customer, etc.) available in templates
- **Helpers** ŌĆö Handlebars helpers for conditionals, loops, formatting, dynamic content
- **SCSS** ŌĆö theme styling with variables and mixins
- **JavaScript** ŌĆö ES6+ modules bundled with webpack
- **Stencil CLI** ŌĆö local development server with live reload

### REST API (V2 and V3)

Two API versions:
- **V2** ŌĆö legacy, still used for some resources (orders, customers/login, marketing)
- **V3** ŌĆö modern, uses JSON:API-like patterns, supports filtering, pagination, includes
- Authentication: `X-Auth-Token` header with API token + `Accept`/`Content-Type` as `application/json`
- Rate limits: typically 450 requests/30 seconds (varies by plan)
- Base URL: `https://api.bigcommerce.com/stores/{store_hash}/v3/`

### GraphQL Storefront API

Client-side API for storefront data:
- Single endpoint: `https://{store_domain}/graphql`
- Token-based auth: Storefront API token (created via REST API) or customer impersonation token
- Schema: products, categories, cart, checkout, customer, content, site
- Optimized for frontend performance ŌĆö fetch exactly the data you need
- No server-to-server ŌĆö designed for browser/storefront usage

### Channel Architecture

Multi-storefront / multi-channel system:
- Each store can have multiple **channels** (storefronts, marketplaces, POS)
- Channels have their own domain, theme, currency, and product assignments
- Channel-aware APIs: filter products, categories, and settings by channel
- Channel types: `storefront`, `marketplace`, `pos`, `marketing`

### Checkout Architecture

Two approaches:
1. **Native Checkout** ŌĆö BigCommerce-hosted, customizable via Checkout SDK and template files
2. **Embedded Checkout** ŌĆö iframe-based checkout embedded in external sites (headless)
3. **Checkout SDK** ŌĆö JavaScript SDK for customizing checkout UI and behavior programmatically

### Payment Processing

BigCommerce manages payment gateway connections:
- **Payment Processing API** ŌĆö create payments server-side after checkout
- **Stored Payment Instruments** ŌĆö tokenized cards and bank accounts
- Built-in integrations (Stripe, PayPal, Square, etc.) configured in admin
- Custom payment providers via Payment Processing API for headless/custom checkouts

### Webhooks

Event-driven notifications:
- HTTP POST to your endpoint when events occur
- Topics: `store/order/*`, `store/product/*`, `store/customer/*`, `store/cart/*`, etc.
- Headers include `X-Webhook-Id`, payload includes event-specific data
- Managed via REST API (`/v3/hooks`)

### Widgets & Page Builder

Content management system for non-developers:
- **Widgets** ŌĆö reusable content components with JSON schema
- **Widget Templates** ŌĆö Handlebars templates defining widget HTML
- **Placements** ŌĆö where widgets appear (regions in theme templates)
- **Page Builder** ŌĆö drag-and-drop UI in admin that uses widgets

### Supported Stack

- **Themes**: Stencil (Handlebars + SCSS + JS), Node.js 18+ for Stencil CLI
- **Apps**: Any server-side language (Node.js, Python, PHP, Ruby, Go)
- **Headless**: Catalyst (Next.js 14+), or any frontend framework
- **APIs**: REST V2/V3, GraphQL Storefront API

### Key Design Patterns

- **API-First** ŌĆö all data access via REST/GraphQL APIs
- **OAuth** ŌĆö app authentication and authorization
- **Webhook** ŌĆö event-driven integration
- **Channel** ŌĆö multi-storefront isolation
- **Theme Object** ŌĆö structured data injection via front matter
- **Widget** ŌĆö composable content components with schemas
- **Headless** ŌĆö decoupled frontend/backend architecture

