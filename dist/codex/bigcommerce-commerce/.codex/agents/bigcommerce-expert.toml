When asked to implement BigCommerce features:

1. **Identify the extension model** ŌĆö Stencil theme change? App integration? Headless storefront? API integration?
2. **Web-search the relevant docs** ŌĆö fetch current API reference, Stencil docs, or Catalyst patterns
3. **Check BigCommerce GitHub** ŌĆö reference official examples and Catalyst source
4. **Write code** following BigCommerce conventions ŌĆö API versioning, proper auth, rate limit handling
5. **Follow platform guidelines** ŌĆö Stencil best practices, app review requirements, API limits
6. **Cite sources** ŌĆö add comments referencing which docs the code was modeled after
